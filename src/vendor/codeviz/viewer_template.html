<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>codeviz — __TITLE__</title>
<style>
  :root {
    --bg: #fafafa; --panel: #fff; --ink: #1d1d1f; --muted: #6b7280;
    --line-hl: #fde68a; --line-next: #bfdbfe; --border: #d1d5db;
    --ref: #2563eb; --obj-border: #9ca3af; --obj-bg: #f9fafb; --accent: #b91c1c;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         color: var(--ink); background: var(--bg); }
  header { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--panel);
           display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 5; }
  header .title { font-weight: 600; }
  header .caption { color: var(--muted); font-size: 13px; }
  .controls { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  button { font: inherit; padding: 4px 12px; border: 1px solid var(--border); background: #fff;
           border-radius: 6px; cursor: pointer; }
  button:disabled { opacity: .4; cursor: default; }
  input[type=range] { width: 220px; }
  .wrap { display: grid; grid-template-columns: minmax(320px, 1fr) minmax(360px, 1fr); gap: 0; }
  .pane { padding: 14px 16px; min-height: 60vh; min-width: 0; }
  .left { border-right: 1px solid var(--border); overflow-x: auto; }
  pre.code { margin: 0; font: 13px/1.6 "SF Mono", Menlo, Consolas, monospace; }
  .codeline { display: block; padding: 0 8px; border-radius: 4px; white-space: pre; }
  .codeline .ln { display: inline-block; width: 2.2em; color: #b0b4ba; text-align: right;
                  margin-right: 12px; user-select: none; }
  .codeline.next { background: var(--line-next); }
  .codeline.executed { background: var(--line-hl); }
  .stdout-box { margin-top: 16px; }
  .stdout-box h4 { margin: 0 0 4px; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
  pre.stdout { margin: 0; background: #1d1d1f; color: #e5e7eb; padding: 8px 10px; border-radius: 6px;
               font: 12px/1.5 "SF Mono", Menlo, monospace; min-height: 1.5em; white-space: pre-wrap; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .cols h4 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
  .frame { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; background: var(--panel); }
  .frame.highlight { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(185,28,28,.12); }
  .frame .fname { font-weight: 600; padding: 6px 10px; border-bottom: 1px solid var(--border);
                  background: #f3f4f6; border-radius: 8px 8px 0 0; font-size: 13px; }
  .var { display: grid; grid-template-columns: auto 1fr; gap: 8px; padding: 4px 10px; align-items: center; }
  .var .vname { color: var(--muted); font-family: "SF Mono", Menlo, monospace; text-align: right; }
  .val-prim { font-family: "SF Mono", Menlo, monospace; }
  .val-str { color: #047857; }
  .val-num { color: #1d4ed8; }
  .val-none { color: #9ca3af; }
  .ref-pill { display: inline-block; min-width: 22px; height: 14px; border-radius: 7px;
              background: var(--ref); position: relative; vertical-align: middle; }
  .obj { border: 1px solid var(--obj-border); border-radius: 8px; margin-bottom: 12px; background: var(--obj-bg);
         display: inline-block; min-width: 60px; }
  .obj.flash { box-shadow: 0 0 0 3px rgba(37,99,235,.35); }
  .obj .otype { font-size: 11px; color: var(--muted); padding: 3px 8px 0; }
  .obj .seq { display: flex; padding: 4px 8px 8px; gap: 0; }
  .obj .cell { border: 1px solid var(--border); padding: 3px 8px; min-width: 26px; text-align: center;
               font-family: "SF Mono", Menlo, monospace; background: #fff; }
  .obj .cell + .cell { border-left: none; }
  .obj .cell .idx { display: block; font-size: 10px; color: #9ca3af; }
  .obj .kv { display: grid; grid-template-columns: auto 1fr; gap: 6px; padding: 4px 8px 8px; }
  .obj .kv .k { font-family: "SF Mono", Menlo, monospace; color: #6b7280; text-align: right; }
  .obj .fnbody { padding: 4px 10px 8px; font-family: "SF Mono", Menlo, monospace; font-size: 12px; }
  #arrows { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
  .objects-host { position: relative; }
  .empty { color: #9ca3af; font-style: italic; }
  .kbd-hint { color: #b0b4ba; font-size: 11px; white-space: nowrap; }
  /* --- assembly view --- */
  .asm-sec { margin-bottom: 16px; }
  .asm-sec h4 { margin: 0 0 6px; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
  .cur-insn { font: 13px/1.5 "SF Mono", Menlo, monospace; background: #1d1d1f; color: #e5e7eb;
              padding: 8px 10px; border-radius: 6px; }
  .cur-insn .pc { color: #9ca3af; }
  .reg-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 3px 18px; }
  .reg { display: flex; justify-content: space-between; padding: 2px 7px; border-radius: 4px;
         font: 12px/1.5 "SF Mono", Menlo, monospace; border: 1px solid transparent; }
  .reg .rn { color: #6b7280; }
  .reg .rv { color: #1d4ed8; }
  .reg.changed { background: var(--line-hl); border-color: #f0c000; }
  .flags { display: flex; flex-wrap: wrap; gap: 6px; }
  .flag { padding: 2px 7px; border: 1px solid var(--border); border-radius: 4px; color: #b0b4ba;
          font: 12px/1.4 "SF Mono", Menlo, monospace; }
  .flag.set { color: #047857; border-color: #047857; font-weight: 600; }
  .flag.changed { background: var(--line-hl); border-color: #f0c000; }
  .stack-row { display: flex; justify-content: space-between; padding: 1px 7px;
               font: 12px/1.5 "SF Mono", Menlo, monospace; }
  .stack-row.top { background: #eef2ff; border-radius: 4px; }
  .stack-row .sa { color: #9ca3af; }
</style>
</head>
<body>
<header>
  <span class="title">codeviz</span>
  <span class="caption" id="caption"></span>
  <div class="controls">
    <button id="first" title="First step (Home / g)">⏮</button>
    <button id="prev" title="Previous step (← / h / k)">◀ Prev</button>
    <input type="range" id="slider" min="0" value="0">
    <button id="next" title="Next step (→ / l / j / Space)">Next ▶</button>
    <button id="last" title="Last step (End / G)">⏭</button>
    <button id="run" title="Jump to the end (run to completion)">Run ⏩</button>
    <span id="counter" style="font-variant-numeric: tabular-nums; min-width: 90px; text-align: right;"></span>
    <span class="kbd-hint">← → step</span>
  </div>
</header>
<div class="wrap">
  <div class="pane left">
    <pre class="code" id="code"></pre>
    <div class="stdout-box">
      <h4>Program output</h4>
      <pre class="stdout" id="stdout"></pre>
    </div>
  </div>
  <div class="pane">
    <div class="cols">
      <div>
        <h4>Frames</h4>
        <div id="frames"></div>
      </div>
      <div class="objects-host">
        <h4>Objects</h4>
        <div id="objects"></div>
        <svg id="arrows"></svg>
      </div>
    </div>
    <div id="asmpane" style="display:none"></div>
  </div>
</div>

<script>
const DATA = __TRACE_JSON__;
const trace = DATA.trace;
const LANG = DATA.lang || "python";
const codeLines = DATA.code.split("\n");

// ---- build code pane once ----
const codeEl = document.getElementById("code");
codeLines.forEach((text, i) => {
  const span = document.createElement("span");
  span.className = "codeline";
  span.id = "codeline-" + (i + 1);
  span.innerHTML = `<span class="ln">${i + 1}</span>`;
  span.appendChild(document.createTextNode(text.length ? text : " "));
  codeEl.appendChild(span);
});

const STEP_KEY = "codeviz:step:" + location.pathname;
let cur = Math.max(0, Math.min(trace.length - 1, +(sessionStorage.getItem(STEP_KEY) || 0)));
const slider = document.getElementById("slider");
slider.max = trace.length - 1;

function isRef(v){ return Array.isArray(v) && v[0] === "REF"; }

function valNode(v){
  const s = document.createElement("span");
  if (v === null){ s.className = "val-prim val-none"; s.textContent = LANG === "python" ? "None" : "null"; return s; }
  if (typeof v === "boolean"){ s.className = "val-prim"; s.textContent = LANG === "python" ? (v ? "True" : "False") : String(v); return s; }
  if (typeof v === "number"){ s.className = "val-prim val-num"; s.textContent = String(v); return s; }
  if (typeof v === "string"){ s.className = "val-prim val-str"; s.textContent = JSON.stringify(v); return s; }
  if (Array.isArray(v)){
    if (v[0] === "REF"){
      const pill = document.createElement("span");
      pill.className = "ref-pill"; pill.dataset.ref = v[1];
      return pill;
    }
    if (v[0] === "SPECIAL_FLOAT" || v[0] === "IMPORTED_FAUX_PRIMITIVE" || v[0] === "JS_TOKEN"){
      s.className = "val-prim val-none"; s.textContent = v[1]; return s;
    }
  }
  s.className = "val-prim"; s.textContent = JSON.stringify(v); return s;
}

function renderObject(id, enc){
  const box = document.createElement("div");
  box.className = "obj"; box.id = "obj-" + id;
  const tag = enc[0];
  const type = document.createElement("div");
  type.className = "otype";
  const label = {LIST:"list", TUPLE:"tuple", SET:"set", DICT:"dict",
                 FUNCTION:"function", INSTANCE:"instance", CLASS:"class"}[tag] || tag.toLowerCase();
  type.textContent = label;
  box.appendChild(type);

  if (tag === "LIST" || tag === "TUPLE" || tag === "SET"){
    const seq = document.createElement("div"); seq.className = "seq";
    const items = enc.slice(1);
    if (!items.length){ const e = document.createElement("span"); e.className="empty"; e.textContent="empty"; box.appendChild(e); }
    items.forEach((el, i) => {
      const cell = document.createElement("div"); cell.className = "cell";
      if (tag !== "SET"){ const idx = document.createElement("span"); idx.className="idx"; idx.textContent=i; cell.appendChild(idx); }
      cell.appendChild(valNode(el)); seq.appendChild(cell);
    });
    box.appendChild(seq);
  } else if (tag === "DICT"){
    const kv = document.createElement("div"); kv.className = "kv";
    const pairs = enc.slice(1);
    if (!pairs.length){ const e = document.createElement("span"); e.className="empty"; e.textContent="empty"; box.appendChild(e); }
    pairs.forEach(([k, val]) => {
      const kEl = document.createElement("div"); kEl.className = "k"; kEl.appendChild(valNode(k)); kEl.append(":");
      kv.appendChild(kEl); const vEl = document.createElement("div"); vEl.appendChild(valNode(val)); kv.appendChild(vEl);
    });
    box.appendChild(kv);
  } else if (tag === "INSTANCE" || tag === "CLASS"){
    const cname = document.createElement("div"); cname.className = "fnbody"; cname.textContent = enc[1];
    box.insertBefore(cname, null);
    const kv = document.createElement("div"); kv.className = "kv";
    enc.slice(2).forEach(pair => {
      if (!Array.isArray(pair) || pair.length < 2) return;
      const kEl = document.createElement("div"); kEl.className = "k"; kEl.textContent = pair[0]; kEl.append(":");
      kv.appendChild(kEl); const vEl = document.createElement("div"); vEl.appendChild(valNode(pair[1])); kv.appendChild(vEl);
    });
    box.appendChild(kv);
  } else if (tag === "FUNCTION"){
    const b = document.createElement("div"); b.className = "fnbody"; b.textContent = enc[1];
    box.appendChild(b);
  } else {
    const b = document.createElement("div"); b.className = "fnbody"; b.textContent = JSON.stringify(enc.slice(1));
    box.appendChild(b);
  }
  return box;
}

function renderFrame(title, names, locals, highlight){
  const f = document.createElement("div");
  f.className = "frame" + (highlight ? " highlight" : "");
  const h = document.createElement("div"); h.className = "fname"; h.textContent = title; f.appendChild(h);
  if (!names.length){ const e = document.createElement("div"); e.className="var"; e.innerHTML='<span></span>'; const em=document.createElement("span"); em.className="empty"; em.textContent="(no variables)"; e.appendChild(em); f.appendChild(e); }
  names.forEach(n => {
    const row = document.createElement("div"); row.className = "var";
    const nm = document.createElement("div"); nm.className = "vname"; nm.textContent = n; row.appendChild(nm);
    const vv = document.createElement("div"); vv.appendChild(valNode(locals[n])); row.appendChild(vv);
    f.appendChild(row);
  });
  return f;
}

function escapeHtml(s){
  return String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
}

const ASM_REG_ORDER = ["rax","rbx","rcx","rdx","rsi","rdi","rbp","rsp",
                       "r8","r9","r10","r11","r12","r13","r14","r15","rip"];
const ASM_FLAG_ORDER = ["ZF","SF","CF","OF","PF","AF","DF"];

function drawAsm(step){
  const prev = cur > 0 ? trace[cur - 1] : null;
  const regs = step.registers || {}, pregs = (prev && prev.registers) || {};
  const flags = step.flags || {}, pflags = (prev && prev.flags) || {};
  let h = "";

  h += `<div class="asm-sec"><h4>Current instruction</h4><div class="cur-insn">`;
  if (step.pc) h += `<span class="pc">${escapeHtml(step.pc)}:</span>  `;
  h += `${escapeHtml(step.instruction || "(none)")}</div></div>`;

  h += `<div class="asm-sec"><h4>Registers</h4><div class="reg-grid">`;
  ASM_REG_ORDER.forEach(r => {
    if (!(r in regs)) return;
    const changed = prev && regs[r] !== pregs[r] ? " changed" : "";
    h += `<div class="reg${changed}"><span class="rn">${r}</span><span class="rv">${escapeHtml(regs[r])}</span></div>`;
  });
  h += `</div></div>`;

  h += `<div class="asm-sec"><h4>Flags</h4><div class="flags">`;
  ASM_FLAG_ORDER.forEach(fn => {
    if (!(fn in flags)) return;
    const set = flags[fn] ? " set" : "";
    const changed = prev && flags[fn] !== pflags[fn] ? " changed" : "";
    h += `<span class="flag${set}${changed}">${fn}=${flags[fn] ? 1 : 0}</span>`;
  });
  h += `</div></div>`;

  h += `<div class="asm-sec"><h4>Stack (top of stack first)</h4>`;
  (step.stack || []).forEach((s, i) => {
    h += `<div class="stack-row${i === 0 ? " top" : ""}"><span class="sa">${escapeHtml(s.addr)}</span><span>${escapeHtml(s.value)}</span></div>`;
  });
  if (!(step.stack || []).length) h += `<div class="empty">(stack empty)</div>`;
  h += `</div>`;

  document.getElementById("asmpane").innerHTML = h;
}

function draw(){
  const step = trace[cur];

  // code highlight
  document.querySelectorAll(".codeline").forEach(el => el.classList.remove("next","executed"));
  const cls = (step.event === "return" || step.event === "exception") ? "executed" : "next";
  const lineEl = document.getElementById("codeline-" + step.line);
  if (lineEl){ lineEl.classList.add(cls); lineEl.scrollIntoView({block:"nearest"}); }

  // caption
  const verb = {call: "about to run", step_line: "about to run", return: "returned from",
                exception: "exception at"}[step.event] || step.event;
  let cap = `${verb} line ${step.line}`;
  if (step.event === "return" && step.func_name) cap = `${step.func_name}() ${cap.replace("returned from ", "returned — ")}`;
  if (step.exception_msg) cap += ` — ${step.exception_msg}`;
  document.getElementById("caption").textContent = cap;

  // stdout
  document.getElementById("stdout").textContent = step.stdout || "";

  // assembly gets a dedicated registers/flags/stack view instead of frames/heap
  if (LANG === "asm"){
    document.querySelector(".cols").style.display = "none";
    document.getElementById("asmpane").style.display = "";
    drawAsm(step);
    document.getElementById("counter").textContent = `Step ${cur+1} / ${trace.length}`;
    slider.value = cur;
    document.getElementById("prev").disabled = cur === 0;
    document.getElementById("first").disabled = cur === 0;
    document.getElementById("next").disabled = cur === trace.length - 1;
    document.getElementById("last").disabled = cur === trace.length - 1;
    return;
  }

  // frames
  const framesEl = document.getElementById("frames"); framesEl.innerHTML = "";
  framesEl.appendChild(renderFrame("Global frame", step.ordered_globals, step.globals, !step.stack_to_render.length));
  step.stack_to_render.forEach(fr => {
    framesEl.appendChild(renderFrame(fr.func_name, fr.ordered_varnames, fr.encoded_locals, fr.is_highlighted));
  });

  // objects (heap) — order by id for stability
  const objEl = document.getElementById("objects"); objEl.innerHTML = "";
  const ids = Object.keys(step.heap).sort((a,b)=>(+a)-(+b));
  if (!ids.length){ const e=document.createElement("div"); e.className="empty"; e.textContent="(no objects yet)"; objEl.appendChild(e); }
  ids.forEach(id => objEl.appendChild(renderObject(id, step.heap[id])));

  // counter + controls
  document.getElementById("counter").textContent = `Step ${cur+1} / ${trace.length}`;
  slider.value = cur;
  document.getElementById("prev").disabled = cur === 0;
  document.getElementById("first").disabled = cur === 0;
  document.getElementById("next").disabled = cur === trace.length - 1;
  document.getElementById("last").disabled = cur === trace.length - 1;

  requestAnimationFrame(drawArrows);
}

function drawArrows(){
  const svg = document.getElementById("arrows");
  const host = svg.parentElement.getBoundingClientRect();
  svg.setAttribute("width", host.width); svg.setAttribute("height", svg.parentElement.scrollHeight);
  svg.innerHTML = "";
  const wrapBox = document.querySelector(".wrap").getBoundingClientRect();
  document.querySelectorAll(".ref-pill").forEach(pill => {
    const target = document.getElementById("obj-" + pill.dataset.ref);
    if (!target) return;
    const p = pill.getBoundingClientRect();
    const t = target.getBoundingClientRect();
    const ho = svg.getBoundingClientRect();
    const x1 = p.right - ho.left, y1 = p.top - ho.top + p.height/2;
    const x2 = t.left - ho.left,  y2 = t.top - ho.top + 14;
    const path = document.createElementNS("http://www.w3.org/2000/svg","path");
    const mx = x1 + Math.max(30, (x2 - x1) / 2);
    path.setAttribute("d", `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`);
    path.setAttribute("fill","none"); path.setAttribute("stroke","#2563eb");
    path.setAttribute("stroke-width","1.5"); path.setAttribute("marker-end","url(#ah)");
    svg.appendChild(path);
  });
  svg.insertAdjacentHTML("afterbegin",
    '<defs><marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">'+
    '<path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/></marker></defs>');
}

function go(i){ cur = Math.max(0, Math.min(trace.length - 1, i)); sessionStorage.setItem(STEP_KEY, cur); draw(); }
document.getElementById("first").onclick = () => go(0);
document.getElementById("prev").onclick  = () => go(cur - 1);
document.getElementById("next").onclick  = () => go(cur + 1);
document.getElementById("last").onclick  = () => go(trace.length - 1);
document.getElementById("run").onclick   = () => go(trace.length - 1);
slider.oninput = e => go(+e.target.value);
document.addEventListener("keydown", e => {
  if (e.target && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
  const k = e.key;
  if (k === "ArrowLeft"  || k === "h" || k === "k" || k === "b"){ go(cur - 1); e.preventDefault(); }
  else if (k === "ArrowRight" || k === "l" || k === "j" || k === "n" || k === " "){ go(cur + 1); e.preventDefault(); }
  else if (k === "Home" || k === "g"){ go(0); e.preventDefault(); }
  else if (k === "End"  || k === "G"){ go(trace.length - 1); e.preventDefault(); }
});
window.addEventListener("resize", () => requestAnimationFrame(drawArrows));
draw();

// --- live reload (only when served over http via `codeviz --serve`) ---
if (location.protocol.startsWith("http")) {
  let known = null;
  setInterval(async () => {
    try {
      const r = await fetch("version", { cache: "no-store" });
      const v = (await r.text()).trim();
      if (known === null) known = v;
      else if (v !== known) {
        sessionStorage.setItem(STEP_KEY, 0);  // a save restarts at step 1
        location.reload();
      }
    } catch (e) { /* server not up yet; ignore */ }
  }, 700);
}
</script>
</body>
</html>
